{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block title %}Criar conta | Priscila Arantes PA{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-6">

        <div class="card shadow-sm border-0 premium-form-card">
            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <span class="luxury-eyebrow">Área do cliente</span>

                    <h1 class="h4 mt-2 mb-2">
                        Criar conta
                    </h1>

                    <p class="text-muted mb-0">
                        Guarde os seus dados para futuras marcações.
                    </p>
                </div>

                <form method="post" novalidate>
                    {% csrf_token %}

                    {{ form|crispy }}

                    <button type="submit" class="btn btn-primary w-100 mt-3">
                        Criar conta
                    </button>
                </form>

                <div class="text-center mt-4">
                    <a href="{% url 'accounts:login' %}" class="luxury-link">
                        Já tenho conta
                    </a>
                </div>

            </div>
        </div>

    </div>
</div>
{% endblock %}
