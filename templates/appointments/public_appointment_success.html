{% extends "base.html" %}

{% block title %}Marcação enviada | Priscila Arantes PA{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-6">

        <div class="card shadow-sm border-0">
            <div class="card-body p-5 text-center">

                <h1 class="h4 mb-3">
                    Marcação realizada com sucesso
                </h1>

                <p class="text-muted mb-3">
                    Guarde o código da sua marcação:
                </p>

                <div class="alert alert-primary fs-5 fw-bold">
                    {{ reference_code }}
                </div>

                <p class="text-muted mb-4">
                    Use este código para consultas ou alterações.
                </p>

                <a href="{% url 'appointments:public_appointment_create' %}" class="btn btn-primary">
                    Nova marcação
                </a>

            </div>
        </div>

    </div>
</div>
{% endblock %}
