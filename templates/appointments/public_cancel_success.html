{% extends "base.html" %}

{% block title %}Cancelado com sucesso{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-5">

        <div class="card shadow-sm border-0">
            <div class="card-body p-4 text-center">

                <h1 class="h5 mb-3 text-danger">
                    Marcação cancelada com sucesso
                </h1>

                <p class="text-muted">
                    Código da marcação:
                </p>

                <div class="alert alert-danger fw-bold">
                    {{ reference_code }}
                </div>

                <p class="text-muted mb-4">
                    Este horário voltou a ficar disponível para novas marcações.
                </p>

                <a href="{% url 'appointments:public_appointment_create' %}" class="btn btn-primary">
                    Fazer nova marcação
                </a>

            </div>
        </div>

    </div>
</div>
{% endblock %}
