{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">
            Confirmar exclusão de cliente
        </div>

        <div class="card-body">
            <p>
                Tem certeza que deseja apagar o cliente
                <strong>{{ customer.full_name }}</strong>?
            </p>

            <p class="text-muted">
                Esta ação só será permitida se o cliente não tiver marcações associadas.
            </p>

            <form method="post">
                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Sim, apagar cliente
                </button>

                <a href="{% url 'appointments:customer_list' %}" class="btn btn-secondary">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
