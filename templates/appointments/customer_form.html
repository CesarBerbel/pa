{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block title %}Novo cliente | Priscila Arantes PA{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-6">

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h4 mb-4">Novo cliente</h1>

                <form method="post" novalidate>
                    {% csrf_token %}

                    {{ form|crispy }}

                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">
                            Salvar
                        </button>

                        <a href="{% url 'appointments:customer_list' %}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
